<meta name="theme-color" content="#1D9E75">
<title>10km-träning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1D9E75;--green-light:#E1F5EE;--green-mid:#9FE1CB;--green-dark:#085041;
    --amber:#854F0B;--amber-light:#FAEEDA;
    --text:#1a1a1a;--text-muted:#6b7280;--text-faint:#9ca3af;
    --bg:#f8f7f4;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);
    --radius:14px;--radius-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;padding-bottom:env(safe-area-inset-bottom)}
  .app{max-width:480px;margin:0 auto;padding:1.25rem 1rem 2rem}

  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--green);letter-spacing:-.3px}
  .logo span{color:var(--text-muted)}

  .level-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
  .level-btn{padding:12px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:left;transition:all .18s;position:relative;overflow:hidden}
  .level-btn.active{border-color:var(--green);background:var(--green-light)}
  .level-btn.active::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 24px 24px 0;border-color:transparent var(--green) transparent transparent}
  .level-btn.active::after{content:'✓';position:absolute;top:1px;right:3px;font-size:11px;color:white;font-weight:600}
  .level-name{display:block;font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px}
  .level-btn.active .level-name{color:var(--green-dark)}
  .level-sub{display:block;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)}
  .level-btn.active .level-sub{color:var(--green)}

  .progress-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:1.25rem}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-label{font-size:13px;color:var(--text-muted)}
  .progress-pct{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--green)}
  .progress-bar{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;margin-bottom:12px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--green));border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
  .badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{font-size:12px;font-weight:500;padding:4px 11px;border-radius:99px}
  .badge-xp{background:var(--green-light);color:var(--green-dark)}
  .badge-streak{background:var(--amber-light);color:var(--amber)}

  .week-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1rem}
  .week-tab{padding:8px 4px 6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-muted);transition:all .15s;text-align:center;line-height:1.2}
  .week-tab .wnum{display:block;font-size:14px;font-weight:600;color:var(--text)}
  .week-tab .wcheck{display:block;font-size:10px;min-height:14px;color:var(--green)}
  .week-tab.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
  .week-tab.active .wnum{color:var(--green-dark)}

function buildIntervals(reps, workSecs, restSecs, workLabel, restLabel) {
  const steps = [];
  for (let i = 0; i < reps; i++) {
    steps.push({label:workLabel, phase:'work', secs:workSecs, desc:`Intervall ${i+1} av ${reps}`});
    if (i < reps-1)
      steps.push({label:restLabel, phase:'rest', secs:restSecs, desc:`Vila — intervall ${i+2} härnäst`});
  }
  return steps;
}

// Wrap any step-list with warmup + cooldown
function withWarmCool(steps, warmSecs=300, coolSecs=300) {
  return [
    {label:'Uppvärmning', phase:'warmup', secs:warmSecs, desc:'Lätt jogg för att värma upp'},
    ...steps,
    {label:'Nedvarvning', phase:'cooldown', secs:coolSecs, desc:'Lugn jogg för att varva ner'}
  ];

// ── APP STATE ─────────────────────────────────────────────────────────────────
const ACHIEVEMENTS = [
  {id:"first",icon:"👟",label:"Första passet",check:d=>d.total>=1},
  {id:"week1",icon:"📅",label:"Vecka 1 klar",check:d=>d.weekDone[0]},
  {id:"halfway",icon:"⚡",label:"Halvvägs (15 pass)",check:d=>d.total>=15},
  {id:"week5",icon:"🔥",label:"Vecka 5 klar",check:d=>d.weekDone[4]},
  {id:"allweeks",icon:"🏆",label:"10 veckor klara",check:d=>d.weekDone.filter(Boolean).length===10},
  {id:"done",icon:"🥇",label:"10km-löpare!",check:d=>d.total>=30}
];

let level='n3', currentWeek=0, appState={};
try{const s=localStorage.getItem('10km_v3');if(s)appState=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem('10km_v3',JSON.stringify(appState));}catch(e){}}
function key(l,w,s){return`${l}_w${w}_s${s}`;}
function getDerived(){
  let total=0,streak=0,weekDone=[];
  for(let w=0;w<10;w++){
    let wd=true;
    for(let s=0;s<3;s++){if(appState[key(level,w,s)])total++;else wd=false;}
    weekDone.push(wd);if(wd)streak++;else streak=0;
  }
  return{total,streak,weekDone};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function setLevel(l){
  level=l;
  document.getElementById('btn-n3').classList.toggle('active',l==='n3');
  document.getElementById('btn-n2').classList.toggle('active',l==='n2');
  render();
}

function render(){
  const dd=getDerived();
  const pct=Math.round(dd.total/30*100);
  document.getElementById('prog-label').textContent=`${dd.total} / 30 pass klara`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('xp-badge').textContent=`${dd.total*50} XP`;
  document.getElementById('streak-badge').textContent=`${dd.streak} veckor streak`;

  const tabsEl=document.getElementById('week-tabs');
  tabsEl.innerHTML='';
  for(let w=0;w<10;w++){
    const btn=document.createElement('button');
    btn.className='week-tab'+(w===currentWeek?' active':'')+(dd.weekDone[w]?' done':'');
    btn.innerHTML=`<span class="wnum">V${w+1}</span><span class="wcheck">${dd.weekDone[w]?'✓':''}</span>`;
    btn.onclick=(()=>{const ww=w;return()=>{currentWeek=ww;render();};})();
    tabsEl.appendChild(btn);
  }

  const listEl=document.getElementById('sessions');
  listEl.innerHTML='';
  DATA[level].weeks[currentWeek].s.forEach((s,i)=>{
    const k=key(level,currentWeek,i);
    const done=!!appState[k];
    const card=document.createElement('div');
    card.className='session-card'+(done?' completed':'');
    const timerBtn=s.timer
      ?`<button class="start-btn" id="sbtn-${i}">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Starta timer
        </button>`:'';
    card.innerHTML=`
      <div class="session-row">
        <div class="checkbox ${done?'checked':''}"><span class="check-icon">✓</span></div>
        <div class="session-body">
          <div class="session-type">${s.t}</div>
          <div class="session-desc">${s.d}</div>
          <div class="session-tip">${s.tip}</div>
          ${done?'<span class="xp-tag">+50 XP</span>':''}
          ${timerBtn}
        </div>
      </div>`;
    card.querySelector('.checkbox').addEventListener('click',ev=>{
      ev.stopPropagation();
      const wasDone=!!appState[k];
      appState[k]=!wasDone;
      save();
      if(!wasDone)spawnConfetti(ev.clientX,ev.clientY);
      render();
    });
    if(s.timer){
      card.querySelector(`#sbtn-${i}`).addEventListener('click',ev=>{
        ev.stopPropagation();
        openTimer(s,currentWeek,i);
      });
    }
    listEl.appendChild(card);
  });

  const achEl=document.getElementById('ach-grid');
  achEl.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const unlocked=a.check(dd);
    const el=document.createElement('div');
    el.className='ach'+(unlocked?' unlocked':'');
    el.innerHTML=`<span class="ach-icon">${unlocked?a.icon:'○'}</span>${a.label}`;
    achEl.appendChild(el);
  });
}

function spawnConfetti(x,y){
  ['🎉','⭐','🏃','💚','🔥','✨'].forEach((e,i)=>{
    const el=document.createElement('div');
    el.className='confetti';el.textContent=e;
    el.style.left=(x+(Math.random()-.5)*100)+'px';
    el.style.top=y+'px';
    el.style.animationDelay=(i*.07)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1500);
  });
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timerSteps=[],timerIdx=0,timerSecsLeft=0,timerTotalSecs=0;
let timerRunning=false,timerInterval=null,wakeLock=null;

const PHASE_LABELS={work:'Kör nu!',rest:'Vila',warmup:'Uppvärmning',cooldown:'Nedvarvning'};

function openTimer(sess){
  timerSteps=sess.timer;
  timerIdx=0;timerRunning=false;
  clearInterval(timerInterval);
  document.getElementById('modal-pass-label').textContent=sess.t;
  document.getElementById('modal-overlay').classList.add('open');
  // Show countdown first, then load step
  runCountdown(()=>loadStep(0));
  requestWakeLock();
}

function closeTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  document.getElementById('modal-overlay').classList.remove('open');
  hideCountdown();
  releaseWakeLock();
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function runCountdown(cb){
  const overlay=document.getElementById('countdown-overlay');
  const numEl=document.getElementById('countdown-num');
  overlay.classList.add('visible');
  let n=3;
  numEl.className='countdown-num';
  numEl.textContent=n;
  playBeep('tick');

  const tick=setInterval(()=>{
    n--;
    // Force re-animation
    numEl.className='';
    void numEl.offsetWidth;
    numEl.className='countdown-num';
    if(n>0){
      numEl.textContent=n;
      playBeep('tick');
    } else if(n===0){
      numEl.className='countdown-go';
      numEl.textContent='Gååå!';
      playBeep('end');
    } else {
      clearInterval(tick);
      overlay.classList.remove('visible');
      cb();
    }
  },900);
}

function hideCountdown(){
  document.getElementById('countdown-overlay').classList.remove('visible');
}

// ── STEP LOGIC ────────────────────────────────────────────────────────────────
function loadStep(idx){
  if(idx>=timerSteps.length){
    setTimerUI('Klart! 🎉',0,'done-phase','Passet är klart — bra jobbat!','',1,1);
    document.getElementById('ctrl-main').textContent='Stäng';
    document.getElementById('ctrl-main').onclick=closeTimer;
    document.getElementById('ctrl-pause').style.display='none';
    document.getElementById('ctrl-skip').style.display='none';
    playBeep('done');
    return;
  }
  const step=timerSteps[idx];
  timerSecsLeft=step.secs;
  timerTotalSecs=step.secs;
  document.getElementById('ctrl-main').textContent='Nästa';
  document.getElementById('ctrl-main').onclick=timerNext;
  document.getElementById('ctrl-pause').style.display='';
  document.getElementById('ctrl-skip').style.display='';
  updateTimerUI();
  startTimer();
}

function startTimer(){
  timerRunning=true;
  document.getElementById('ctrl-pause').textContent='Pausa';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSecsLeft--;
    if(timerSecsLeft<=0){
      timerSecsLeft=0;updateTimerUI();
      clearInterval(timerInterval);timerRunning=false;
      playBeep('end');
      setTimeout(()=>{timerIdx++;loadStep(timerIdx);},800);
    } else {
      if(timerSecsLeft<=3)playBeep('tick');
      updateTimerUI();
    }
  },1000);
}

function togglePause(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('ctrl-pause').textContent='Fortsätt';
  } else {startTimer();}
}

function timerNext(){clearInterval(timerInterval);timerRunning=false;timerIdx++;loadStep(timerIdx);}
function timerSkip(){timerNext();}

function updateTimerUI(){
  if(timerIdx>=timerSteps.length)return;
  const step=timerSteps[timerIdx];
  const next=timerIdx+1<timerSteps.length?timerSteps[timerIdx+1]:null;
  const progressText=next?`Nästa: ${next.label} (${fmtTime(next.secs)})`:'Sista momentet';
  setTimerUI(PHASE_LABELS[step.phase]||step.label,timerSecsLeft,step.phase,step.desc,progressText,timerSecsLeft,timerTotalSecs);
}

function setTimerUI(phase,secs,phaseClass,desc,progress,fillVal,fillMax){
  const phaseEl=document.getElementById('timer-phase');
  phaseEl.textContent=phase;phaseEl.className='timer-phase '+phaseClass;
  document.getElementById('timer-clock').textContent=fmtTime(secs);
  document.getElementById('timer-desc').textContent=desc;
  document.getElementById('timer-progress-text').textContent=progress;
  const fill=document.getElementById('timer-bar-fill');
  fill.className='timer-bar-fill '+phaseClass;
  fill.style.width=(fillMax>0?fillVal/fillMax*100:100)+'%';
}

function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playBeep(type){
  try{
    const ctx=getAudioCtx();
    const cfgs={
      tick:[{f:880,d:.06,v:.3}],
      end:[{f:660,d:.12,v:.5},{f:880,d:.18,v:.6,t:.15}],
      done:[{f:523,d:.15,v:.5},{f:659,d:.15,v:.5,t:.18},{f:784,d:.3,v:.6,t:.36}]
    };
    (cfgs[type]||[]).forEach(({f,d,v,t=0})=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=f;osc.type='sine';
      const at=ctx.currentTime+t;
      gain.gain.setValueAtTime(v,at);
      gain.gain.exponentialRampToValueAtTime(.001,at+d);
      osc.start(at);osc.stop(at+d+.01);
    });
  }catch(e){}
}

// ── WAKE LOCK ─────────────────────────────────────────────────────────────────
async function requestWakeLock(){
  try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
}
function releaseWakeLock(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&document.getElementById('modal-overlay').classList.contains('open'))requestWakeLock();
});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeTimer();});

render();
</script>
